<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Login to MobileResale — Browse and buy quality pre-owned smartphones at unbeatable prices." />
  <title>MobileResale — Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" />
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand-header">
        <div class="logo">📱</div>
        <h1>MobileResale</h1>
        <p>Sign in to browse pre-owned phones</p>
      </div>

      <form onsubmit="login(event)" id="login-form">
        <div class="form-group">
          <label for="login-email">Email or Username</label>
          <input type="text" id="login-email" placeholder="you@example.com" autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password"
            autocomplete="current-password" />
        </div>

        <button type="submit" class="btn-login" id="btn-login">Sign In</button>
        <p class="login-error" id="login-error"></p>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // If already logged in, skip login
    if (localStorage.getItem("mobileResale_loggedIn")) {
      window.location.href = "home.html";
    }
  </script>
</body>

</html>
